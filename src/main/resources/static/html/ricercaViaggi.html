<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="navbar"></div>

    <!-- RICERCA -->
        <div class="ricerca">
            <h2>Cerca viaggi</h2>

            <input type="text" id="filtroLuogo" placeholder="Luogo">
            <input type="text" id="filtroFormula" placeholder="Formula">
            <input type="date" id="filtroData">

            <input type="button" value="Cerca" onclick="cercaViaggi()">
            <input type="button" value="Mostra tutti" onclick="visualizzaTutti()">
        </div>

        <!-- RISULTATI -->
        <div class="risultati">
            <h2>Viaggi disponibili</h2>

            <table id="tabellaViaggi">
                <thead>
                    <tr>
                        <th>Codice</th>
                        <th>Luogo</th>
                        <th>Partenza</th>
                        <th>Ritorno</th>
                        <th>Formula</th>
                        <th>Costo</th>
                        <th>Posti</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="body_viaggi">
                    <!-- righe generate da JS -->
                </tbody>
            </table>
        </div>

        <script src="../js/navbar.js"></script>
    
</body>
</html>
