<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaggi</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <link rel="stylesheet" href="../css/ricercaViaggi_style.css">

</head>

<body>

    
    <main>

        <div class="contenitoreImmagine">

        <div id="navbarAuthenticated"></div>


        <h1>Viaggi disponibili</h1>

        <section class="ricerca">

            <h2>Ricerca</h2>

            <div class="ricerca-controls">

            <label for="tipoRicerca">Ricerca per:</label>

            <select id="tipoRicerca" onchange="cambiaFiltro()">

                <option value="">-- Seleziona --</option>

                <option value="luogo">Luogo</option>

                <option value="formula">Formula</option>

                <option value="data">Data di partenza</option>

            </select>


            <!-- Luogo -->

            <div id="ricercaLuogo" style="display:none;">

                <input
                    type="text"
                    id="filtroLuogo"
                    placeholder="Inserisci il luogo">

            </div>

            <!-- Formula -->

            <div id="ricercaFormula" style="display:none;">

                <select id="filtroFormula">

                    <option value="">Seleziona formula</option>

                    <option value="SOLO_PERNOTTAMENTO">Solo pernottamento</option>

                    <option value="BED_AND_BREAKFAST">Bed & Breakfast</option>

                    <option value="MEZZA_PENSIONE">Mezza pensione</option>

                    <option value="PENSIONE_COMPLETA">Pensione completa</option>

                    <option value="ALL_INCLUSIVE">All Inclusive</option>

                </select>

            </div>

            <!-- Data -->

            <div id="ricercaData" style="display:none;">

                <input
                    type="date"
                    id="filtroData">

            </div>


            <div class="ricerca-buttons">

            <button onclick="cercaViaggi()">

                Cerca

            </button>

            <button onclick="visualizzaTutti()">

                Mostra tutti

            </button>

            </div>

            </div>

        </section>

        </div>

        <hr>

        <section id="contenitoreViaggi">

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script src="../js/navbarAuth.js"></script>

    <script src="../js/ricercaViaggi.js"></script>
    
</body>

</html>
