<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../css/gestioneAdmin_style.css">

    
</head>
<body>
    <div id="contenitoreImmagine">

    <div id="navbarAuthenticated"></div>

    <!-- SEZIONE ADMIN -->
    <div class="admin" id="sezioneAdmin">
        <h2>Gestione viaggi</h2>

        <form id="formViaggio">
            <input type="hidden" id="codiceViaggio">

            <input type="text" id="luogo" placeholder="Luogo" required>
            <input type="date" id="dataPartenza" required>
            <input type="date" id="dataRitorno" required>

            <select id="formula">

                    <option value="">Seleziona formula</option>

                    <option value="SOLO_PERNOTTAMENTO">Solo pernottamento</option>

                    <option value="BED_AND_BREAKFAST">Bed & Breakfast</option>

                    <option value="MEZZA_PENSIONE">Mezza pensione</option>

                    <option value="PENSIONE_COMPLETA">Pensione completa</option>

                    <option value="ALL_INCLUSIVE">All Inclusive</option>

                </select>

            <input type="number" id="costo" placeholder="Costo" step="0.01" required>
            <input type="number" id="postiDisponibili" placeholder="Posti disponibili" required>

            <input type="button" id="btnSalvaViaggio" value="Aggiungi viaggio" onclick="crea()">
            <input type="button" id="btnAnnullaModifica" value="Annulla modifica" onclick="annullaModifica()" style="display:none;">
        </form>

        </div>

        </div>

        <hr>

        <h2>Viaggi esistenti</h2>

        <section id="elencoViaggiAdmin">
            <!-- generato dinamicamente da adminViaggi.js -->
        </section>
    

    <script src="../js/navbarAuth.js"></script>
    <script src="../js/gestioneAdmin.js"></script>
    
    

</body>
</html>
