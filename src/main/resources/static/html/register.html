<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRAZIONE</title>

    <link rel="stylesheet" href="../css/style.css">

</head>
<body>

    <div class="container">

        <h2>Registrazione</h2>

        <form id="registerForm">

            <input type="text" id="nome" placeholder="Nome" required>

            <input type="text" id="cognome" placeholder="Cognome" required>

            <input type="text" id="indirizzo" placeholder="Indirizzo" required>

            <input type="text" id="cf" placeholder="Codice Fiscale" required>

            <input type="text" id="username" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required>

            <input type="button" value="Registrati" onclick="registrati()">

            <p>
                Hai già un account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

    <script src="../js/register.js"></script>
    
</body>
</html>
