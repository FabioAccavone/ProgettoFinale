<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRAZIONE</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <link rel="stylesheet" href="../css/auth_style.css">

</head>
<body>

    <div class="container">

        <h2>Registrazione</h2>

        <form id="registerForm">

            <input type="text" id="nome" placeholder="Nome" required oninput="checkNome(this)">

            <input type="text" id="cognome" placeholder="Cognome" required oninput="checkCognome(this)">

            <input type="text" id="indirizzo" placeholder="Indirizzo" required>

            <input type="text" id="cf" placeholder="Codice Fiscale" required oninput="checkCF(this)">

            <input type="text" id="username" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required oninput="checkPassword(this)">

            <input type="button" value="Registrati" onclick="registrati()"> 

        </form>

        <p>
            Hai già un account?
            <a href="login.html">Login</a>
        </p>

        <input type="button" value="Torna alla Home" onclick="window.location.href='home.html'">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script src="../js/register.js"></script>
    
</body>
</html>
