<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIAGGI</title>

    <link rel="stylesheet" href="../css/style.css">

</head>
<body>

    <div class="container">

        <div class="topbar">
            <h1>Agenzia Viaggi</h1>
            <div>
                <span id="benvenuto"></span>
                <input type="button" value="Logout" onclick="logout()">
            </div>
        </div>

        <!-- RICERCA -->
        <div class="ricerca">
            <h2>Cerca viaggi</h2>

            <input type="text" id="filtroLuogo" placeholder="Luogo">
            <input type="text" id="filtroFormula" placeholder="Formula">
            <input type="date" id="filtroData">

            <input type="button" value="Cerca" onclick="cercaViaggi()">
            <input type="button" value="Mostra tutti" onclick="visualizzaTutti()">
        </div>

        <!-- RISULTATI -->
        <div class="risultati">
            <h2>Viaggi disponibili</h2>

            <table id="tabellaViaggi">
                <thead>
                    <tr>
                        <th>Codice</th>
                        <th>Luogo</th>
                        <th>Partenza</th>
                        <th>Ritorno</th>
                        <th>Formula</th>
                        <th>Costo</th>
                        <th>Posti</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="body_viaggi">
                    <!-- righe generate da JS -->
                </tbody>
            </table>
        </div>

        <!-- SEZIONE ADMIN -->
        <div class="admin" id="sezioneAdmin">
            <h2>Gestione viaggi (ADMIN)</h2>

            <form id="formViaggio">
                <input type="hidden" id="codiceViaggio">

                <input type="text" id="luogo" placeholder="Luogo" required>
                <input type="date" id="dataPartenza" required>
                <input type="date" id="dataRitorno" required>
                <input type="text" id="formula" placeholder="Formula" required>
                <input type="number" id="costo" placeholder="Costo" step="0.01" required>
                <input type="number" id="postiDisponibili" placeholder="Posti disponibili" required>

                <input type="button" id="creaViaggio" value="Aggiungi viaggio" onclick="creaViaggio()">
                <input type="button" id="modificaViaggio" value="Modifica viaggio" onclick="modificaViaggio()">
                <input type="button" id="cancellaViaggio" value="Elimina viaggio" onclick="cancellaViaggio()">
            </form>
        </div>

    </div>


    <!-- PRENOTAZIONE -->
    <div class="prenotazione">
        <h2>Prenota viaggio</h2>

        <input type="number" id="codicePrenotazione" placeholder="Codice viaggio">

        <input type="number" id="numeroPersone" placeholder="Numero persone" min="1">

        <input type="button" value="Prenota" onclick="prenotaViaggio()">
    </div>

    <script src="../js/logout.js"></script>
    <script src="../js/ricercaViaggi.js"></script>
    <script src="../js/creaViaggio.js"></script>
    <script src="../js/modificaViaggio.js"></script>
    <script src="../js/cancellaViaggio.js"></script>
    <script src="../js/prenotaViaggio.js"></script>
    
</body>
</html>>
